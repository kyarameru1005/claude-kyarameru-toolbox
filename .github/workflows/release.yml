name: release

# v* タグを push するとビルド済みバイナリを GitHub Releases に公開する。
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # 壊れたバイナリを公開しないよう、ビルド前にテストで検証する。
      - name: Test
        working-directory: apps/moira
        run: cargo test --release --target ${{ matrix.target }}
      - name: Build
        working-directory: apps/moira
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        working-directory: apps/moira
        run: |
          asset="moira-${{ matrix.target }}"
          cd "target/${{ matrix.target }}/release"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$GITHUB_WORKSPACE/${asset}.zip" moira.exe >/dev/null
            file="${asset}.zip"
          else
            tar -czf "$GITHUB_WORKSPACE/${asset}.tar.gz" moira
            file="${asset}.tar.gz"
          fi
          echo "ASSET=${file}" >> "$GITHUB_ENV"
          # 配布物の sha256（16進ハッシュのみ）を生成。インストーラ側で検証する。
          cd "$GITHUB_WORKSPACE"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
          else
            shasum -a 256 "$file" | awk '{print $1}' > "${file}.sha256"
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
