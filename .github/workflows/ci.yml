name: ci

on:
  push:
    branches: [main]
  pull_request:

# 最小権限。CI は読み取りだけで足りる。
permissions:
  contents: read

# 同一ブランチ / PR の古い実行はキャンセルしてリソースを節約する。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Validate marketplace and plugins
        run: python scripts/validate.py
      - name: Validate with claude CLI (if available)
        run: |
          set -euo pipefail
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate .
            for p in plugins/*/*/; do claude plugin validate "$p"; done
          else
            echo "claude CLI not available; scripts/validate.py で検証済み"
          fi
      - name: Run tests
        run: python -m pytest -q

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        working-directory: apps/moira
        run: cargo fmt --check
      - name: Clippy
        working-directory: apps/moira
        run: cargo clippy --all-targets -- -D warnings
      - name: Build and test moira
        working-directory: apps/moira
        run: |
          set -euo pipefail
          cargo build --verbose
          cargo test --verbose
