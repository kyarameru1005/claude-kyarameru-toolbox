name: ci

on:
  push:
    branches: [main]
  pull_request:

# 最小権限。CI は読み取りだけで足りる。
permissions:
  contents: read

# 同一ブランチ / PR の古い実行はキャンセルしてリソースを節約する。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Validate marketplace and plugins
        run: python scripts/validate.py
      - name: Validate with claude CLI (if available)
        run: |
          set -euo pipefail
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate .
            for p in plugins/*/*/; do claude plugin validate "$p"; done
          else
            echo "claude CLI not available; scripts/validate.py で検証済み"
          fi
      - name: Run tests
        run: python -m pytest -q
      - name: Audit Python dependencies (pip-audit)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit

  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Shellcheck
        run: |
          set -euo pipefail
          # severity=warning: info レベルの様式指摘（SC2015 の A && B || C 等）は通し、
          # 未使用変数・未定義動作など warning 以上の実害で落とす。
          mapfile -t files < <(find . -name '*.sh' -not -path './.git/*')
          shellcheck --severity=warning "${files[@]}"

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        working-directory: apps/moira
        run: cargo fmt --check
      - name: Clippy
        working-directory: apps/moira
        run: cargo clippy --all-targets -- -D warnings
      - name: Build and test moira
        working-directory: apps/moira
        run: |
          set -euo pipefail
          cargo build --verbose
          cargo test --verbose
      - name: Audit dependencies (cargo audit)
        working-directory: apps/moira
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked
          cargo audit
